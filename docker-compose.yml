# Local dev only: Postgres 16 + pgvector. The app runs end-to-end on a laptop
# against this before any AWS work. In deployment this is replaced by RDS.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scribe-db
    environment:
      POSTGRES_USER: scribe
      POSTGRES_PASSWORD: scribe_local_dev
      POSTGRES_DB: scribe
    ports:
      - "5432:5432"
    volumes:
      - scribe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scribe -d scribe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scribe_pgdata:
