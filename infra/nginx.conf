# nginx site config for the Clinical Scribe platform.
#
# nginx is the ONLY network-facing process. It terminates TLS, serves the built
# React SPA as static files at /, and reverse-proxies /api to the FastAPI app on
# 127.0.0.1:8000 (managed by systemd). The app is never directly on 80/443.
#
# Install to /etc/nginx/sites-available/scribe and symlink into sites-enabled
# (bootstrap.sh does this). certbot edits the ssl_certificate lines in place.

# --- HTTP: redirect everything to HTTPS (certbot also manages this) ---
server {
    listen 80;
    listen [::]:80;
    server_name SCRIBE_DOMAIN;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name SCRIBE_DOMAIN;

    # Valid Let's Encrypt certificate (certbot fills these in; NEVER self-signed).
    ssl_certificate     /etc/letsencrypt/live/SCRIBE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SCRIBE_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers (HSTS only over TLS).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Transcripts can be large; allow a generous request body.
    client_max_body_size 2m;

    # --- SPA static files ---
    root /var/www/scribe;
    index index.html;

    # Hashed asset filenames -> safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SSE / streaming generation: buffering MUST be off ---
    # Without proxy_buffering off, nginx buffers the whole response and the
    # token-by-token stream silently collapses into a single dump. Mandatory.
    # This regex location is matched before the generic /api/ prefix below.
    location ~ ^/api/encounters/[0-9]+/generate$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;            # <-- the linchpin for live streaming
        proxy_cache off;
        proxy_read_timeout 300s;        # long generations (tool calls + tokens)
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # --- Everything else under /api -> the app ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- SPA fallback: client-side routing ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
